<!-- Django/Django-bboard/shop/templates/shop/product/detail.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }}</title>
</head>
<body>
    <a href="{% url 'shop:product_list' %}">← Назад к списку</a>

    <h1>{{ product.name }}</h1>
    <p>Категория: {{ product.category.name }}</p>
    
    <p><strong>Цена: {{ product.price }} ₽</strong></p>
    
    <h3>Описание:</h3>
    <p>{{ product.description|linebreaks }}</p>
    
    <p><small>Добавлен: {{ product.created|date:"d.m.Y" }}</small></p>
    <p><small>Обновлён: {{ product.updated|date:"d.m.Y H:i" }}</small></p>
</body>
</html>
